<svg xmlns="http://www.w3.org/2000/svg" width="760" height="260" viewBox="0 0 760 260" role="img" aria-labelledby="title desc">
  <title id="title">Linear programming optimal solution schematic</title>
  <desc id="desc">Two feasible polytopes, one with a face of optimal solutions and one with a unique vertex optimum.</desc>
  <defs>
    <style>
      .poly { fill: #f8d49a; stroke: #a65f00; stroke-width: 4; stroke-linejoin: round; }
      .opt { fill: none; stroke: #d83a34; stroke-width: 4; stroke-dasharray: 10 8; stroke-linecap: round; }
      .label { font: 22px Georgia, 'Times New Roman', serif; fill: #1f2937; }
      .small { font: italic 20px Georgia, 'Times New Roman', serif; fill: #b91c1c; paint-order: stroke; stroke: #fff; stroke-width: 4; stroke-linejoin: round; }
      .caption { font: 16px system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #4b5563; }
    </style>
  </defs>

  <g transform="translate(90,25)">
    <polygon class="poly" points="95,10 180,55 180,145 95,190 10,145 10,55"/>
    <line class="opt" x1="0" y1="120" x2="165" y2="35"/>
    <text class="label" x="43" y="108">U(a,b)</text>
    <text class="small" x="58" y="164" transform="rotate(-27 58 164)">P*</text>
    <text class="caption" x="18" y="225">many optimal solutions along a face</text>
  </g>

  <g transform="translate(465,25)">
    <polygon class="poly" points="95,10 180,55 180,145 95,190 10,145 10,55"/>
    <line class="opt" x1="18" y1="74" x2="92" y2="198"/>
    <text class="label" x="43" y="108">U(a,b)</text>
    <text class="small" x="36" y="150" transform="rotate(58 36 150)">P*</text>
    <circle cx="18" cy="74" r="5" fill="#b91c1c"/>
    <text class="caption" x="25" y="225">unique optimal solution at a vertex</text>
  </g>
</svg>
