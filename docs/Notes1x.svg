<svg xmlns="http://www.w3.org/2000/svg" width="520" height="300" viewBox="0 0 520 300" role="img" aria-labelledby="title desc">
  <title id="title">Coupling matrix transport schematic</title>
  <desc id="desc">Two source masses connect to three target masses with arrows labeled P_ij.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#394150"/>
    </marker>
    <style>
      .source { fill: #a9c9f4; stroke: #1f2937; stroke-width: 2.2; }
      .target { fill: #f3a2a2; stroke: #1f2937; stroke-width: 2.2; }
      .flow { fill: none; stroke: #394150; stroke-width: 1.6; marker-end: url(#arrow); }
      .label { font: italic 22px Georgia, 'Times New Roman', serif; fill: #111827; }
      .edge-label { font: italic 17px Georgia, 'Times New Roman', serif; fill: #374151; paint-order: stroke; stroke: #fff; stroke-width: 4; stroke-linejoin: round; }
    </style>
  </defs>

  <line class="flow" x1="133" y1="92" x2="384" y2="66"/>
  <line class="flow" x1="133" y1="92" x2="381" y2="147"/>
  <line class="flow" x1="133" y1="92" x2="386" y2="226"/>
  <line class="flow" x1="134" y1="208" x2="381" y2="73"/>
  <line class="flow" x1="134" y1="208" x2="380" y2="151"/>
  <line class="flow" x1="134" y1="208" x2="386" y2="224"/>

  <circle class="source" cx="96" cy="88" r="34"/>
  <circle class="source" cx="96" cy="212" r="50"/>
  <circle class="target" cx="424" cy="60" r="27"/>
  <circle class="target" cx="424" cy="150" r="40"/>
  <circle class="target" cx="424" cy="240" r="21"/>

  <text class="label" x="81" y="95">x<tspan baseline-shift="sub" font-size="14">1</tspan></text>
  <text class="label" x="80" y="220">x<tspan baseline-shift="sub" font-size="14">2</tspan></text>
  <text class="label" x="410" y="67">y<tspan baseline-shift="sub" font-size="14">1</tspan></text>
  <text class="label" x="409" y="157">y<tspan baseline-shift="sub" font-size="14">2</tspan></text>
  <text class="label" x="410" y="247">y<tspan baseline-shift="sub" font-size="14">3</tspan></text>

  <text class="edge-label" x="235" y="64">P<tspan baseline-shift="sub" font-size="12">11</tspan></text>
  <text class="edge-label" x="238" y="117">P<tspan baseline-shift="sub" font-size="12">12</tspan></text>
  <text class="edge-label" x="259" y="181">P<tspan baseline-shift="sub" font-size="12">13</tspan></text>
  <text class="edge-label" x="249" y="116">P<tspan baseline-shift="sub" font-size="12">21</tspan></text>
  <text class="edge-label" x="251" y="188">P<tspan baseline-shift="sub" font-size="12">22</tspan></text>
  <text class="edge-label" x="242" y="241">P<tspan baseline-shift="sub" font-size="12">23</tspan></text>
</svg>
